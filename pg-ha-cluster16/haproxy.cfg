global
    log stdout format raw daemon
    maxconn 256

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 10s
    timeout client  1m
    timeout server  1m

# Пул мастер узлов (один активный)
frontend postgres_master
    bind *:5000
    default_backend master_nodes

# Пул реплик
frontend postgres_replicas
    bind *:5001
    default_backend replica_nodes

# Backend для мастера
backend master_nodes
    option httpchk GET /master
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg1 pg1:5432 check port 8008
    server pg2 pg2:5432 check port 8008
    server pg3 pg3:5432 check port 8008

# Backend для реплик
backend replica_nodes
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg1 pg1:5432 check port 8008
    server pg2 pg2:5432 check port 8008
    server pg3 pg3:5432 check port 8008






#include <iostream>
#include <cmath>
#include <cstdio>

using namespace std;

const int64_t N = 1000000000;
const int S = 1000000;  // размер сегмента
const int LIMIT = 32000; // sqrt(N) ≈ 31623

bool prime[LIMIT + 1];   // решето для малых чисел
int primes[4000];        // список простых чисел
int primes_size = 0;

bool block[S];            // сегмент

int main() {
    // обычное решето до sqrt(N)
    for (int i = 0; i <= LIMIT; i++) prime[i] = true;
    prime[0] = prime[1] = false;

    for (int i = 2; i <= LIMIT; i++) {
        if (prime[i]) {
            primes[primes_size++] = i;
            for (int j = i * i; j <= LIMIT; j += i)
                prime[j] = false;
        }
    }

    int64_t count = 0;

    // сегментированное решето
    for (int64_t k = 0; k * S <= N; k++) {
        int64_t start = k * S;

        for (int i = 0; i < S; i++) block[i] = true;

        for (int i = 0; i < primes_size; i++) {
            int p = primes[i];
            int64_t start_idx = max((int64_t)p * p, ((start + p - 1) / p) * p);

            for (int64_t j = start_idx; j < start + S && j <= N; j += p)
                block[j - start] = false;
        }

        if (k == 0) {
            block[0] = block[1] = false; // 0 и 1 не простые
        }

        for (int i = 0; i < S && start + i <= N; i++) {
            if (block[i]) count++;
        }
    }

    cout << "Количество простых: " << count << endl;

    return 0;
}
